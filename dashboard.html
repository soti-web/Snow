<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/style.css">
<link rel="stylesheet" href="./assets/css/dashboard.css">
</head>
<body>

<!-- NAV -->
<nav class="dash-nav">
  <div class="dash-nav-left">
    <div class="logo">folio.</div>
    <span class="nav-username" id="nav-username">@...</span>
  </div>
  <div class="dash-nav-right">
    <button class="icon-btn-nav" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
    <button class="btn btn-ghost" onclick="viewPortfolio()">View</button>
    <button class="btn btn-primary" onclick="savePortfolio()" id="save-btn">Save</button>
    <button class="icon-btn-nav logout-btn" onclick="logout()" title="Log out">↩</button>
  </div>
</nav>

<!-- MAIN -->
<div class="dash-main">

  <!-- SIDEBAR -->
  <div class="dash-sidebar" id="dash-sidebar">

    <!-- AVATAR -->
    <div class="profile-header-section">
      <div class="avatar-upload-wrap">
        <div class="avatar-preview" id="avatar-preview">
          <span id="avatar-emoji-display">🧑‍💻</span>
          <img id="avatar-img" src="" alt="" style="display:none;">
        </div>
        <div class="avatar-actions">
          <button class="avatar-action-btn" onclick="document.getElementById('photo-input').click()">Upload photo</button>
          <button class="avatar-action-btn" onclick="toggleEmojiPicker()">Use emoji</button>
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
      </div>
      <div class="emoji-picker-wrap" id="emoji-picker-wrap" style="display:none;">
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
    </div>

<!--
  ═══════════════════════════════════════════════════════════════════════
  FOLIO — TEMPLATE SELECTOR + EDIT PANEL
  دابنێ بۆ جێی بەشی کۆنی templates grid و edit form لە dashboard.html
  ═══════════════════════════════════════════════════════════════════════
-->

<!-- ── TEMPLATES SECTION ── -->

<div class="sidebar-section">
  <div class="section-label">Templates</div>

  <!-- GRID -->

  <div class="tmpl-grid" id="templates-grid">
    <!-- Rendered by renderTemplatesGrid() in dashboard.js -->
  </div>

  <!-- ══ EDIT PANEL — slides open after template pick ══ -->

  <div class="edit-panel-wrap" id="edit-panel-wrap">
    <div class="edit-panel">

```
  <!-- Panel Header -->
  <div class="panel-header">
    <div class="panel-header-dot"></div>
    <div class="panel-header-title">Editing</div>
    <div class="panel-header-tmpl" id="edit-panel-tmpl-name">—</div>
  </div>

  <!-- ─ AVATAR ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Avatar</div>
    <div class="avatar-edit-area">
      <div class="avatar-circle">
        <img id="avatar-img" style="display:none;">
        <span id="avatar-emoji-display">🧑‍💻</span>
      </div>
      <div class="avatar-actions">
        <label class="avatar-btn accent" style="cursor:pointer;">
          Upload photo
          <input type="file" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
        </label>
        <button class="avatar-btn" onclick="toggleEmojiPicker()">Pick emoji</button>
      </div>
    </div>
    <!-- Emoji picker -->
    <div class="emoji-picker-panel" id="emoji-picker-wrap">
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
  </div>

  <!-- ─ PROFILE INFO ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Profile</div>
    <input id="pf-name"     class="glass-input" type="text" placeholder="Your name"      oninput="markDirty()">
    <input id="pf-role"     class="glass-input" type="text" placeholder="Your role / title" oninput="markDirty()">
    <input id="pf-location" class="glass-input" type="text" placeholder="📍 Location"    oninput="markDirty()">
    <textarea id="pf-bio"   class="glass-input" rows="3"    placeholder="Short bio…"      oninput="markDirty()"
      style="resize:vertical;margin-top:7px;line-height:1.55;"></textarea>
  </div>

  <!-- ─ SKILLS ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Skills</div>
    <div class="skill-tags-wrap" id="skills-list"></div>
    <div class="skill-add-row">
      <input id="skill-input" class="glass-input" type="text"
        placeholder="e.g. React, Figma…" onkeydown="handleSkillKey(event)"
        style="flex:1;">
      <button class="skill-add-btn" onclick="addSkill()">+ Add</button>
    </div>
  </div>

  <!-- ─ EXPERIENCE ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Experience</div>
    <div id="work-list"></div>
    <button class="add-item-btn" onclick="addWork()">+ Add experience</button>
  </div>

  <!-- ─ LINKS ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Links</div>
    <div id="links-list"></div>
    <button class="add-item-btn" onclick="addLink()">+ Add link</button>
  </div>

  <!-- ─ BACKGROUND ─ -->
  <div class="edit-section">
    <div class="edit-section-label">Background</div>
    <div class="bg-swatches" id="bg-grid"></div>
  </div>

</div><!-- /edit-panel -->

  </div><!-- /edit-panel-wrap -->
</div><!-- /sidebar-section -->

<!-- ══ UPGRADE MODAL ══ -->

<div class="upgrade-overlay" id="upgrade-modal" onclick="handleModalClick(event)">
  <div class="upgrade-sheet">
    <div class="upgrade-handle"></div>
    <div style="font-size:2rem;text-align:center;margin-bottom:10px;">✨</div>
    <div class="upgrade-title">Unlock Pro Templates</div>
    <div class="upgrade-sub">Get Gold, Fire, Motion, Neon, Glass and more with a Pro plan.</div>
    <button class="upgrade-pro-btn">Upgrade to Pro →</button>
    <button class="upgrade-cancel-btn" onclick="closeUpgradeModal()">Maybe later</button>
  </div>
</div>

<!-- ══ TOAST ══ -->

<div id="toast" class="dash-toast"></div>

<script type="module" src="./assets/js/dashboard.js"></script>
</body>
</html>
