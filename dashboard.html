<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/style.css">
<link rel="stylesheet" href="./assets/css/dashboard.css">
</head>
<body>

<!-- NAV -->
<nav class="dash-nav">
  <div class="dash-nav-left">
    <div class="logo">folio.</div>
    <span class="nav-username" id="nav-username">@...</span>
  </div>
  <div class="dash-nav-right">
    <button class="icon-btn-nav" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">🌙</button>
    <button class="btn btn-ghost" onclick="viewPortfolio()">View</button>
    <button class="btn btn-primary" onclick="savePortfolio()" id="save-btn">Save</button>
    <button class="icon-btn-nav logout-btn" onclick="logout()" title="Log out">↩</button>
  </div>
</nav>

<!-- MAIN -->
<div class="dash-main">

  <!-- SIDEBAR -->
  <div class="dash-sidebar" id="dash-sidebar">

    <!-- AVATAR -->
    <div class="profile-header-section">
      <div class="avatar-upload-wrap">
        <div class="avatar-preview" id="avatar-preview">
          <span id="avatar-emoji-display">🧑‍💻</span>
          <img id="avatar-img" src="" alt="" style="display:none;">
        </div>
        <div class="avatar-actions">
          <button class="avatar-action-btn" onclick="document.getElementById('photo-input').click()">Upload photo</button>
          <button class="avatar-action-btn" onclick="toggleEmojiPicker()">Use emoji</button>
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
      </div>
      <div class="emoji-picker-wrap" id="emoji-picker-wrap" style="display:none;">
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
    </div>

    <!-- TEMPLATES -->
    <div class="templates-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Templates
      </div>
      <div class="templates-grid" id="templates-grid"></div>
    </div>

    <!-- ABOUT -->
    <div class="dash-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        About
      </div>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="pf-name" placeholder="e.g. Hama Karwan" oninput="markDirty()">
      </div>
      <div class="input-group">
        <label>Job Title</label>
        <input type="text" id="pf-role" placeholder="e.g. Web Developer" oninput="markDirty()">
      </div>
      <div class="input-group">
        <label>Bio</label>
        <textarea id="pf-bio" placeholder="Tell the world about yourself..." oninput="markDirty()"></textarea>
      </div>
      <div class="input-group">
        <label>Location</label>
        <input type="text" id="pf-location" placeholder="e.g. Erbil, Iraq" oninput="markDirty()">
      </div>
    </div>

    <!-- BACKGROUND -->
    <div class="dash-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M2 12h20"/></svg>
        Background
      </div>
      <div class="bg-grid" id="bg-grid"></div>
    </div>

    <!-- SKILLS -->
    <div class="dash-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Skills
      </div>
      <div class="tags-list" id="skills-list"></div>
      <div class="tag-input-row">
        <input type="text" id="skill-input" placeholder="Add a skill..." onkeydown="handleSkillKey(event)">
        <button class="btn btn-ghost" style="font-size:0.78rem;padding:0.4rem 0.75rem;" onclick="addSkill()">Add</button>
      </div>
    </div>

    <!-- WORK -->
    <div class="dash-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Work Experience
      </div>
      <div class="work-list" id="work-list"></div>
      <button class="add-item-btn" onclick="addWork()">+ Add experience</button>
    </div>

    <!-- LINKS -->
    <div class="dash-section">
      <div class="dash-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Links
      </div>
      <div class="links-list" id="links-list"></div>
      <button class="add-item-btn" onclick="addLink()">+ Add link</button>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="dash-preview" id="dash-preview">
    <div class="preview-sticky">
      <div class="preview-label">Live Preview</div>
      <div class="preview-browser">
        <div class="browser-dots">
          <div class="bd bd-r"></div>
          <div class="bd bd-y"></div>
          <div class="bd bd-g"></div>
        </div>
        <div class="browser-url" id="browser-url">folio.app/you</div>
      </div>
      <div class="pf-preview-card" id="pf-preview-card"></div>
    </div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-bottom-nav">
  <button class="mob-nav-btn active" onclick="showMobileTab('edit')" id="mob-edit-btn">Edit</button>
  <button class="mob-nav-btn" onclick="showMobileTab('preview')" id="mob-preview-btn">Preview</button>
</div>

<!-- UPGRADE MODAL -->
<div class="modal-overlay" id="upgrade-modal" onclick="handleModalClick(event)">
  <div class="modal-box">
    <div class="modal-icon">⭐</div>
    <h2>Premium Template</h2>
    <p>This template is available for Pro users. Upgrade to unlock all premium templates and features.</p>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="closeUpgradeModal()">Maybe later</button>
    <button class="modal-close" onclick="closeUpgradeModal()">Close</button>
  </div>
</div>

<div class="toast" id="toast">Saved!</div>

<script type="module" src="./assets/js/dashboard.js"></script>
</body>
</html>
